<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>글 게시판</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .post-form { max-width: 600px; margin: 30px auto 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 18px; }
    .post-form input, .post-form textarea { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; }
    .post-form button { width: 100%; padding: 10px; background: #FFD369; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .post-form button:hover { background: #e0b44f; }
    .post-list { max-width: 700px; margin: 0 auto; }
    .post-item { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px #0001; margin-bottom: 16px; padding: 16px; cursor: pointer; transition: box-shadow 0.2s; }
    .post-item:hover { box-shadow: 0 2px 12px #0002; background: #f9f9f9; }
    .post-title { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
    .post-date { color: #888; font-size: 13px; margin-bottom: 8px; }
    .post-detail-view { max-width: 700px; margin: 30px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 24px; }
    .post-detail-view .back-btn { display: inline-block; margin-bottom: 18px; color: #333; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <header>
    <h1>블루 레코드</h1>

    <div class="header-content">
      <!-- 왼쪽: SNS 링크 -->
      <div class="social-links">
        <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://tistory.com" target="_blank"><i class="fas fa-blog"></i></a>
      </div>

      <!-- 오른쪽: 프로필 이미지 -->
      <div class="profile">
        <img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdn%2Fb2yJT5%2Fbtr1XxichTb%2FghHxI9JpXKxsHWPKt0kJ91%2Fimg.png" alt="내 프로필">
      </div>
    </div>
  </header>

  <!-- 검색창 (왼쪽 상단) -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="캐릭터 검색...">
    <button type="button" id="searchBtn">검색</button>
  </div>

  <!-- 네비게이션 -->
  <nav>
    <ul>
      <li><a href="index.html">캐릭터 리스트</a></li>
      <li><a href="universe.html">기타설정</a></li>
      <li><a href="art.html">그림</a></li>
      <li><a href="writing.html">글</a></li>
      <li><a href="comic.html">만화</a></li>
      <li><a href="music.html">노래</a></li>
      <li><a href="game.html">게임</a></li>
    </ul>
  </nav>

  <!-- 게시글 작성 폼 -->
  <section>
    <form id="postForm" class="post-form">
      <input type="text" id="postTitle" placeholder="제목" required>
      <textarea id="postContent" placeholder="HTML로 내용을 입력하세요" rows="5" required></textarea>
      <button type="submit">게시글 작성</button>
    </form>
  </section>

  <!-- 게시판 영역 -->
  <section id="board">
    <div id="post-list" class="post-list"></div>
    <div id="post-detail" style="display:none;"></div>
  </section>

  <script>
    // 게시글 데이터 (로컬스토리지 사용)
    function getPosts() {
      return JSON.parse(localStorage.getItem('univPosts') || '[]');
    }
    function savePosts(posts) {
      localStorage.setItem('univPosts', JSON.stringify(posts));
    }

    function renderList() {
      const posts = getPosts();
      const list = document.getElementById('post-list');
      const detail = document.getElementById('post-detail');
      list.style.display = '';
      detail.style.display = 'none';
      list.innerHTML = posts.length === 0 ? '<div style="text-align:center;color:#888;">아직 게시글이 없습니다.</div>' : '';
      posts.slice().reverse().forEach((post, idx) => {
        const div = document.createElement('div');
        div.className = 'post-item';
        div.innerHTML = `<div class='post-title'>${post.title}</div><div class='post-date'>${post.date}</div>`;
        div.onclick = () => renderDetail(posts.length - 1 - idx);
        list.appendChild(div);
      });
    }

    function renderDetail(idx) {
      const posts = getPosts();
      const post = posts[idx];
      const list = document.getElementById('post-list');
      const detail = document.getElementById('post-detail');
      list.style.display = 'none';
      detail.style.display = '';
      detail.className = 'post-detail-view';
      detail.innerHTML = `<span class='back-btn'>&larr; 목록으로</span><h2>${post.title}</h2><div style='color:#888;font-size:13px;margin-bottom:12px;'>${post.date}</div><div>${post.content}</div>`;
      detail.querySelector('.back-btn').onclick = renderList;
    }

    document.getElementById('postForm').onsubmit = function(e) {
      e.preventDefault();
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if (!title || !content) return;
      const posts = getPosts();
      posts.push({ title, content, date: new Date().toLocaleString() });
      savePosts(posts);
      this.reset();
      renderList();
    };

    renderList();
  </script>
</body>
</html>

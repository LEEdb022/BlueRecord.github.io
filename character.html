<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캐릭터 상세</title>
  <style>
    #character-detail { max-width: 600px; margin: 50px auto; text-align: center; }
    #character-detail img { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<div id="character-detail"></div>

<script>
const params = new URLSearchParams(window.location.search);
const charId = params.get("id");

fetch("characters.json")
  .then(res => res.json())
  .then(data => {
    const char = data.find(c => c.id === charId);
    const container = document.getElementById("character-detail");
    if (!char) {
      container.innerText = "캐릭터를 찾을 수 없습니다.";
      return;
    }

    // 먼저 이름과 이미지 표시
    container.innerHTML = `
      <h2>${char.name}</h2>
      <img src="${char.image}" alt="${char.name}">
      <div id="markdown-content">불러오는 중...</div>
      <a href="index.html">← 목록으로 돌아가기</a>
    `;

    // 마크다운 파일 fetch
    fetch(char.markdown)
      .then(res => res.text())
      .then(md => {
        document.getElementById("markdown-content").innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById("markdown-content").innerText = "마크다운 불러오기 실패";
        console.error(err);
      });
  });
</script>


</body>
</html>

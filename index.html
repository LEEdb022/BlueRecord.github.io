<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Blue Record</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <!-- 헤더 -->
  <header>
    <h1>블루 레코드</h1>

    <div class="header-content">
    <!-- 왼쪽: SNS 링크 -->
    <div class="social-links">
        <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://tistory.com" target="_blank"><i class="fas fa-blog"></i></a>
    </div>

    <!-- 오른쪽: 프로필 이미지 -->
    <div class="profile">
      <img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdn%2Fb2yJT5%2Fbtr1XxichTb%2FghHxI9JpXKxsHWPKt0kJ91%2Fimg.png" alt="내 프로필">
    </div>
  </div>
</header>

<!-- Font Awesome 아이콘 불러오기 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- 검색창 (왼쪽 상단) -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="캐릭터 검색...">
    <button type="button" id="searchBtn">검색</button>
  </div>

  <!-- 네비게이션 -->
  <nav>
    <ul>
      <li><a href="index.html">캐릭터 리스트</a></li>
      <li><a href="universe.html">기타설정</a></li>
      <li><a href="art.html">그림</a></li>
      <li><a href="writing.html">글</a></li>
      <li><a href="comic.html">만화</a></li>
      <li><a href="music.html">노래</a></li>
      <li><a href="game.html">게임</a></li>
    </ul>
  </nav>

<section id="characters">
  <!-- 상단에 필터된/총 개수 표시 -->
  <h2>캐릭터 리스트 (<span id="charCount">0</span>명)</h2>
  <div id="character-count" style="text-align:center; margin:10px 0;"></div>

  <!-- 전체 판(노란테두리+검은바탕) 안에 5x7 흰영역이 들어감 -->
  <div class="character-list-container">
    <div id="character-list" class="character-list"></div>
  </div>

  <!-- 페이지네이션 -->
  <div id="pagination" style="text-align:center; margin:20px 0;"></div>
</section>

<!-- 검색 + 페이징 + 리스트 렌더링 스크립트 -->
<script>
  const ITEMS_PER_PAGE = 35; // 5x7
  let characters = [];      // 전체 데이터
  let filteredData = [];    // 필터링된 데이터 (검색 적용)
  let currentPage = 1;

  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");

  // 유틸: 엘리먼트 가져오기
  const charListEl = document.getElementById("character-list");
  const charCountSpan = document.getElementById("charCount");
  const charRangeEl = document.getElementById("character-count");
  const paginationEl = document.getElementById("pagination");

  // fetch로 characters.json 불러오기
  fetch("characters.json")
    .then(res => {
      if (!res.ok) throw new Error("characters.json을 불러오는 데 실패했습니다.");
      return res.json();
    })
    .then(data => {
      characters = Array.isArray(data) ? data : [];
      filteredData = characters.slice(); // 초기엔 전체
      renderPage(1);
    })
    .catch(err => {
      console.error(err);
      charListEl.innerHTML = "<div style='color:#000; padding:20px;'>캐릭터 목록을 불러오지 못했습니다.</div>";
    });

  // 페이지 렌더링
  function renderPage(page) {
    // 페이지 번호 보정
    const totalItems = filteredData.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
    if (page < 1) page = 1;
    if (page > totalPages) page = totalPages;
    currentPage = page;

    // 카운트 표시 (필터된 개수)
    charCountSpan.innerText = totalItems;

    // 빈 결과 처리
    if (totalItems === 0) {
      charListEl.innerHTML = "<div style='padding:40px; text-align:center; color:#333;'>검색 결과가 없습니다.</div>";
      charRangeEl.innerText = "총 0명";
      paginationEl.innerHTML = "";
      return;
    }

    // 표시 범위 계산
    const start = (page - 1) * ITEMS_PER_PAGE;
    const end = Math.min(start + ITEMS_PER_PAGE, totalItems);
    const pageItems = filteredData.slice(start, end);

    // 범위 텍스트 업데이트
    charRangeEl.innerText = `총 ${totalItems}명 중 ${start + 1}~${end}번째 캐릭터`;

    // 리스트 초기화 후 채우기
    charListEl.innerHTML = "";
    pageItems.forEach((char) => {
  // 전체 characters 배열에서 index를 찾아서 고유 순번 계산
  const globalIndex = characters.findIndex(c => c.id === char.id) + 1;

  const div = document.createElement("div");
  div.className = "character";
  div.innerHTML = `
      <a href="${char.html}" style="text-decoration:none; color:inherit;">
        <div class="char-number">#${globalIndex}</div>
        <img src="${char.image}" alt="${char.name}">
        <div class="character-name">${char.name}</div>
      </a>
  `;
  charListEl.appendChild(div);
});


    renderPagination(totalPages, page);
  }

  // 페이지네이션 렌더링 (이전/현재/다음)
  function renderPagination(totalPages, page) {
    paginationEl.innerHTML = "";

    // 이전
    const prevBtn = document.createElement("button");
    prevBtn.innerText = "◀ 이전";
    prevBtn.disabled = page <= 1;
    prevBtn.style.marginRight = "8px";
    prevBtn.onclick = () => { renderPage(page - 1); };
    paginationEl.appendChild(prevBtn);

    // 현재 페이지 텍스트
    const info = document.createElement("span");
    info.innerText = ` ${page} / ${totalPages} `;
    info.style.margin = "0 8px";
    paginationEl.appendChild(info);

    // 다음
    const nextBtn = document.createElement("button");
    nextBtn.innerText = "다음 ▶";
    nextBtn.disabled = page >= totalPages;
    nextBtn.style.marginLeft = "8px";
    nextBtn.onclick = () => { renderPage(page + 1); };
    paginationEl.appendChild(nextBtn);
  }

  // 검색(필터링) 함수
  function filterCharacters() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      // 빈 검색어면 전체 복원
      filteredData = characters.slice();
    } else {
      filteredData = characters.filter(c => {
        // name 뿐만 아니라 id나 기타 필드도 포함해서 검색하고 싶으면 여기에 추가
        return (c.name && c.name.toLowerCase().includes(q)) ||
               (c.id && c.id.toLowerCase().includes(q));
      });
    }
    currentPage = 1;
    renderPage(1);
  }

  // 이벤트 바인딩
  searchBtn.addEventListener("click", filterCharacters);
  searchInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") filterCharacters();
  });

  // (옵션) 실시간 검색(입력할 때마다 필터) - 원치 않으면 주석 처리
  // let debounceTimer = null;
  // searchInput.addEventListener("input", () => {
  //   clearTimeout(debounceTimer);
  //   debounceTimer = setTimeout(filterCharacters, 200);
  // });
</script>

</body>
</html>
